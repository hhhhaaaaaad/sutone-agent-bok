<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070a12"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#62f6c7"/>
      <stop offset="100%" style="stop-color:#5aa9ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰几何 -->
  <circle cx="80" cy="80" r="200" fill="rgba(98,246,199,0.04)"/>
  <circle cx="1120" cy="550" r="180" fill="rgba(90,169,255,0.04)"/>
  <line x1="80" y1="580" x2="400" y2="580" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <line x1="800" y1="50" x2="1150" y2="50" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- 类别标签 -->
  <rect x="80" y="280" width="80" height="28" rx="6" fill="rgba(98,246,199,0.12)"/>
  <text x="120" y="299" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#62f6c7">Redis</text>

  <!-- 标题 -->
  <text x="80" y="360" font-family="sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="1">
    深入理解 Redis
  </text>
  <text x="80" y="412" font-family="sans-serif" font-size="44" font-weight="700" fill="#62f6c7" letter-spacing="1">
    Cache-Aside 一致性
  </text>

  <!-- 副标题 -->
  <text x="80" y="460" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.55)">
    从读写策略到生产级实践，一文讲透缓存一致性方案
  </text>

  <!-- 底部作者 -->
  <text x="80" y="560" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">AI 智能体工作台 · 技术博客</text>
  <text x="1050" y="560" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">2026.07</text>
</svg>